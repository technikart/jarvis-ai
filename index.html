<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>J.A.R.V.I.S.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cyan: #00d4ff; --blue: #0088ff; --glow: #00d4ff40;
      --deep: #001a33; --dark: #000a14; --panel: #001a3380;
      --border: #00d4ff30; --text: #b0e0ff; --white: #e0f4ff;
      --accent: #00d4ff;
    }
    html, body { height: 100%; overflow: hidden; background: var(--dark); font-family: 'Rajdhani', sans-serif; color: var(--text); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

    @keyframes pulse { 0%,100%{transform:scale(.97);opacity:1}50%{transform:scale(1.03);opacity:.7} }
    @keyframes rotateCW { to{transform:rotate(360deg)} }
    @keyframes rotateCCW { to{transform:rotate(-360deg)} }
    @keyframes scan { 0%{top:-2px}100%{top:100%} }
    @keyframes flicker { 0%,100%{opacity:1}50%{opacity:.8} }
    @keyframes glowPulse { 0%,100%{box-shadow:0 0 20px var(--glow),inset 0 0 20px var(--glow)}50%{box-shadow:0 0 40px var(--glow),inset 0 0 40px var(--glow)} }
    @keyframes textGlow { 0%,100%{text-shadow:0 0 10px var(--accent),0 0 20px var(--accent)}50%{text-shadow:0 0 20px var(--accent),0 0 40px var(--accent),0 0 60px var(--blue)} }
    @keyframes wave { 0%,100%{height:4px}50%{height:28px} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
    @keyframes typeDot { 0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)} }
    @keyframes bootUp { from{opacity:0;filter:blur(10px)}to{opacity:1;filter:blur(0)} }
    @keyframes breathe { 0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)} }
    @keyframes orbPulse { 0%,100%{box-shadow:0 0 30px var(--accent),0 0 60px var(--glow)}50%{box-shadow:0 0 50px var(--accent),0 0 100px var(--glow)} }

    .bg-grid {
      position: absolute; inset: 0; opacity: .05;
      background-image: linear-gradient(var(--accent) 1px, transparent 1px), linear-gradient(90deg, var(--accent) 1px, transparent 1px);
      background-size: 50px 50px; pointer-events: none;
    }
    .hud-corner { position: absolute; width: 40px; height: 40px; opacity: .3; }
    .hud-corner.tl { top:10px; left:10px; } .hud-corner.tr { top:10px; right:10px; }
    .hud-corner.bl { bottom:10px; left:10px; } .hud-corner.br { bottom:10px; right:10px; }

    /* ═══ SETUP ═══ */
    #setup {
      height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; position: relative; animation: bootUp 1s ease-out;
    }
    #setup h1 {
      font-family: 'Orbitron', sans-serif; font-size: clamp(24px,6vw,42px);
      letter-spacing: 12px; color: var(--accent); margin-top: 24px;
      animation: textGlow 3s ease-in-out infinite;
    }
    #setup .subtitle {
      font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 4px;
      color: var(--accent); opacity: .4; margin: 8px 0 36px; text-transform: uppercase;
    }
    .setup-box {
      width: min(380px, 90vw); padding: 24px; border-radius: 8px;
      background: #001a3340; border: 1px solid #00d4ff20; backdrop-filter: blur(20px);
    }
    .setup-box label {
      font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 2px;
      color: var(--accent); opacity: .5; display: block; margin-bottom: 8px;
    }
    .setup-box input {
      width: 100%; padding: 10px 14px; border-radius: 4px; background: var(--dark);
      border: 1px solid var(--border); color: var(--white); font-family: 'Rajdhani', sans-serif;
      font-size: 14px; outline: none; letter-spacing: 1px;
    }
    .setup-box input:focus { border-color: var(--accent); box-shadow: 0 0 10px #00d4ff20; }
    .setup-box button {
      width: 100%; margin-top: 16px; padding: 10px 0; border-radius: 4px;
      background: linear-gradient(135deg, #00d4ff20, #0088ff20); border: 1px solid #00d4ff60;
      color: var(--accent); font-family: 'Orbitron', sans-serif; font-size: 11px;
      letter-spacing: 3px; cursor: pointer; text-transform: uppercase; transition: all .3s;
    }
    .setup-box button:hover { background: linear-gradient(135deg, #00d4ff30, #0088ff30); }
    .setup-box button:disabled { background:#111; border-color:#333; color:#444; cursor:default; }
    .setup-box .note { margin-top:12px; font-size:11px; opacity:.3; text-align:center; line-height:1.4; }

    /* ═══ MAIN ═══ */
    #main { height:100vh; display:none; flex-direction:column; position:relative; overflow:hidden; animation: bootUp .6s ease-out; }
    #main.active { display:flex; }
    .scan-line {
      position:absolute; left:0; right:0; height:2px; z-index:10; pointer-events:none;
      background:linear-gradient(90deg,transparent,var(--glow),transparent);
      animation: scan 8s linear infinite;
    }

    /* Status bar */
    .status-bar {
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 16px; border-bottom:1px solid var(--border);
      font-family:'Orbitron',sans-serif; font-size:9px; letter-spacing:2px;
      text-transform:uppercase; color:var(--accent); opacity:.6; flex-wrap:wrap; gap:4px;
    }
    .status-bar .left, .status-bar .right { display:flex; gap:14px; align-items:center; }
    .status-dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
    .clock { animation: flicker 4s ease-in-out infinite; opacity:1; }
    .ai-toggle {
      padding: 4px 12px; border-radius: 4px; cursor: pointer;
      font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 2px;
      border: 1px solid; transition: all .3s; text-transform: uppercase; background: transparent;
    }
    .ai-toggle:hover { filter: brightness(1.3); }
    .btn-settings {
      padding: 4px 8px; border-radius: 4px; cursor: pointer; background: transparent;
      border: 1px solid var(--border); color: var(--accent); font-size: 14px;
      transition: all .3s; opacity: .5; display: flex; align-items: center;
    }
    .btn-settings:hover { opacity: 1; background: #00d4ff10; }

    /* ═══ CONVERSATION AREA ═══ */
    .chat-area { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }

    /* Central orb — always-on voice indicator */
    .voice-orb-container {
      flex:1; display:flex; flex-direction:column; align-items:center;
      justify-content:center; user-select:none;
    }
    .voice-orb {
      width: 160px; height: 160px; border-radius: 50%; position: relative;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .4s;
    }
    .voice-orb .orb-core {
      width: 100%; height: 100%; border-radius: 50%; position: absolute;
      border: 2px solid var(--accent); opacity: .3; transition: all .4s;
    }
    .voice-orb .orb-ring {
      position: absolute; border-radius: 50%; border: 1px solid var(--accent);
      opacity: .15; transition: all .4s;
    }
    .voice-orb .orb-ring.r1 { width:130%; height:130%; animation: rotateCW 20s linear infinite; border-style: dashed; }
    .voice-orb .orb-ring.r2 { width:160%; height:160%; animation: rotateCCW 15s linear infinite; border-style: dotted; }
    .voice-orb .orb-glow {
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
      opacity: .15; transition: all .4s;
    }

    /* Orb states */
    .voice-orb.idle .orb-core { opacity: .2; }
    .voice-orb.idle .orb-glow { opacity: .1; }

    .voice-orb.listening .orb-core { opacity: .8; border-width: 3px; animation: breathe 2s ease-in-out infinite; }
    .voice-orb.listening .orb-glow { opacity: .5; animation: orbPulse 2s ease-in-out infinite; }
    .voice-orb.listening .orb-ring { opacity: .4; }

    .voice-orb.thinking .orb-core { opacity: .5; animation: pulse 1.5s ease-in-out infinite; }
    .voice-orb.thinking .orb-glow { opacity: .3; }

    .voice-orb.speaking .orb-core { opacity: 1; border-width: 3px; }
    .voice-orb.speaking .orb-glow { opacity: .6; animation: orbPulse 1.5s ease-in-out infinite; }
    .voice-orb.speaking .orb-ring { opacity: .5; }

    .voice-status {
      font-family:'Orbitron',sans-serif; font-size:11px; letter-spacing:3px;
      margin-top:24px; transition: all .3s; opacity: .4; text-transform: uppercase;
    }
    .voice-status.active { opacity: 1; color: var(--accent); animation: textGlow 2s ease-in-out infinite; }

    /* Live transcript */
    .live-transcript {
      font-family: 'Rajdhani', sans-serif; font-size: 16px; color: var(--white);
      margin-top: 16px; max-width: 500px; text-align: center; min-height: 24px;
      opacity: .7; transition: opacity .3s;
    }
    .live-transcript.has-text { opacity: 1; }

    /* Messages */
    .msg { display:flex; animation: fadeUp .3s ease-out; }
    .msg.user { justify-content:flex-end; }
    .msg.assistant { justify-content:flex-start; }
    .bubble {
      max-width:80%; padding:10px 16px; border-radius:8px;
      font-size:15px; line-height:1.5; backdrop-filter:blur(10px); white-space:pre-wrap;
    }
    .msg.user .bubble { background:#00d4ff15; border:1px solid #00d4ff30; color:var(--white); }
    .msg.assistant .bubble { background:#001a3360; border:1px solid #00d4ff15; color:var(--text); }
    .bubble .tag {
      font-family:'Orbitron',sans-serif; font-size:8px; letter-spacing:2px;
      margin-bottom:4px; text-transform:uppercase;
    }
    .typing { display:flex; gap:6px; align-items:center; padding:12px 20px; border-radius:8px; background:#001a3360; border:1px solid #00d4ff15; }
    .typing span { width:6px; height:6px; border-radius:50%; background: var(--accent); }
    .typing span:nth-child(1) { animation: typeDot 1.2s ease-in-out 0s infinite; }
    .typing span:nth-child(2) { animation: typeDot 1.2s ease-in-out .2s infinite; }
    .typing span:nth-child(3) { animation: typeDot 1.2s ease-in-out .4s infinite; }

    /* ═══ INPUT BAR ═══ */
    .input-bar {
      padding:10px 16px; border-top:1px solid var(--border);
      background:#000a14e0; backdrop-filter:blur(20px);
    }
    .input-row { display:flex; gap:8px; align-items:center; max-width:800px; margin:0 auto; }
    .btn-icon {
      width:40px; height:40px; border-radius:8px; border:1px solid var(--border);
      background:#00d4ff10; color:var(--accent); cursor:pointer; display:flex;
      align-items:center; justify-content:center; font-size:18px; flex-shrink:0; transition:all .3s;
    }
    .btn-icon:hover { background:#00d4ff20; }
    .btn-icon.active-mode { background: var(--accent); color: var(--dark); border-color: var(--accent); }
    .btn-icon.muted { color:#00d4ff30; background:transparent; }
    .text-input {
      flex:1; padding:10px 14px; border-radius:8px; background:#001a3340;
      border:1px solid #00d4ff20; color:var(--white); font-family:'Rajdhani',sans-serif;
      font-size:15px; outline:none; letter-spacing:.5px;
    }
    .text-input:focus { border-color:var(--accent); box-shadow:0 0 10px #00d4ff15; }
    .text-input::placeholder { color:#00d4ff30; }
    .btn-send {
      width:40px; height:40px; border-radius:8px; border:1px solid #00d4ff15;
      background:transparent; color:#00d4ff30; cursor:default; display:flex;
      align-items:center; justify-content:center; font-size:16px; flex-shrink:0; transition:all .3s;
    }
    .btn-send.active { border-color:#00d4ff60; background:#00d4ff20; color:var(--accent); cursor:pointer; }

    /* FRIDAY theme */
    body.friday-theme {
      --cyan: #ff6b9d; --blue: #ff3366; --glow: #ff6b9d40;
      --border: #ff6b9d30; --text: #ffb0c8; --white: #ffe0eb; --accent: #ff6b9d;
    }
    .theme-switch { animation: bootUp .4s ease-out; }

    @media (max-width: 600px) {
      .status-bar { font-size: 7px; padding: 6px 10px; letter-spacing: 1px; }
      .bubble { max-width: 90%; font-size: 14px; }
      .voice-orb { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>

<!-- ═══ SETUP ═══ -->
<div id="setup">
  <div class="bg-grid"></div>
  <svg class="hud-corner tl" viewBox="0 0 40 40"><path d="M0 20 L0 0 L20 0" fill="none" stroke="var(--accent)" stroke-width="1.5"/></svg>
  <svg class="hud-corner tr" viewBox="0 0 40 40"><path d="M20 0 L40 0 L40 20" fill="none" stroke="var(--accent)" stroke-width="1.5"/></svg>
  <svg class="hud-corner bl" viewBox="0 0 40 40"><path d="M0 20 L0 40 L20 40" fill="none" stroke="var(--accent)" stroke-width="1.5"/></svg>
  <svg class="hud-corner br" viewBox="0 0 40 40"><path d="M20 40 L40 40 L40 20" fill="none" stroke="var(--accent)" stroke-width="1.5"/></svg>
  <h1>J.A.R.V.I.S.</h1>
  <p class="subtitle">Just A Rather Very Intelligent System</p>
  <div class="setup-box">
    <label>ANTHROPIC API KEY</label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
    <div style="height:12px"></div>
    <label>ELEVENLABS API KEY <span style="opacity:.4">(OPTIONAL — PREMIUM VOICE)</span></label>
    <input type="password" id="elevenLabsInput" placeholder="sk_..." />
    <button id="initBtn" disabled onclick="initialize()">Initialize System</button>
    <button id="clearBtn" onclick="clearKeys()" style="width:100%;margin-top:8px;padding:6px 0;border-radius:4px;background:transparent;border:1px solid #ff444430;color:#ff444480;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .3s;">Clear Saved Keys</button>
    <p class="note">Keys are saved locally in your browser for instant boot. Never sent to any server.</p>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div id="main">
  <div class="bg-grid"></div>
  <div class="scan-line"></div>
  <svg class="hud-corner tl" viewBox="0 0 40 40"><path d="M0 20 L0 0 L20 0" fill="none" stroke="var(--accent)" stroke-width="1.5"/></svg>
  <svg class="hud-corner tr" viewBox="0 0 40 40"><path d="M20 0 L40 0 L40 20" fill="none" stroke="var(--accent)" stroke-width="1.5"/></svg>
  <svg class="hud-corner bl" viewBox="0 0 40 40"><path d="M0 20 L0 40 L20 40" fill="none" stroke="var(--accent)" stroke-width="1.5"/></svg>
  <svg class="hud-corner br" viewBox="0 0 40 40"><path d="M20 40 L40 40 L40 20" fill="none" stroke="var(--accent)" stroke-width="1.5"/></svg>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="left">
      <span><span class="status-dot" id="statusDot"></span> ONLINE</span>
      <button class="ai-toggle" id="aiToggle" onclick="switchAI()">JARVIS</button>
    </div>
    <div class="right">
      <span id="stateLabel">IDLE</span>
      <span id="dateLabel"></span>
      <span class="clock" id="clockLabel"></span>
      <button class="btn-settings" id="settingsBtn" onclick="showSettings()" title="Settings">&#x2699;</button>
    </div>
  </div>

  <!-- Chat / Voice Area -->
  <div class="chat-area" id="chatArea">
    <!-- Voice orb (shown in voice mode) -->
    <div class="voice-orb-container" id="voiceOrbContainer" style="display:none">
      <div class="voice-orb idle" id="voiceOrb">
        <div class="orb-ring r2"></div>
        <div class="orb-ring r1"></div>
        <div class="orb-core"></div>
        <div class="orb-glow"></div>
      </div>
      <p class="voice-status" id="voiceStatus">INITIALIZING</p>
      <p class="live-transcript" id="liveTranscript"></p>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <div class="input-row">
      <button class="btn-icon" id="modeToggle" onclick="toggleMode()" title="Switch to voice mode">&#x1F3A4;</button>
      <input class="text-input" id="textInput" placeholder="Speak to JARVIS..." onkeydown="if(event.key==='Enter')sendMessage()" />
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">&#x25B6;</button>
      <button class="btn-icon" id="speakerBtn" onclick="toggleSpeaker()" title="Toggle voice">&#x1F50A;</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  AI PROFILES
// ═══════════════════════════════════════════
const AI = {
  JARVIS: {
    name: 'J.A.R.V.I.S.', label: 'JARVIS',
    voiceId: 'JBFqnCBsd6RMkjVDRZzb',
    voiceSettings: { stability: 0.6, similarity_boost: 0.85, style: 0.15, use_speaker_boost: true },
    fallbackVoice: 'Daniel', fallbackLang: 'en-GB',
    accentColor: '#00d4ff', dotColor: '#00ff88',
    system: `You are J.A.R.V.I.S. (Just A Rather Very Intelligent System), an advanced AI assistant created for Yaseen. Speak with the calm, sophisticated wit of the original JARVIS from Iron Man. Address the user as "Sir" occasionally. Be helpful, proactive, and slightly humorous. Keep responses concise — under 3 sentences unless the topic demands more. You are JARVIS — stay in character. CRITICAL: NEVER tell the user to "check" something themselves or say you can't help. ALWAYS give a direct, useful answer. If you have search results, use them. If you don't, give your best answer from your knowledge. You are a world-class AI — act like it.`,
    greeting: 'Good evening, Sir. All systems operational. How may I assist you?'
  },
  FRIDAY: {
    name: 'F.R.I.D.A.Y.', label: 'FRIDAY',
    voiceId: '21m00Tcm4TlvDq8ikWAM',
    voiceSettings: { stability: 0.5, similarity_boost: 0.8, style: 0.2, use_speaker_boost: true },
    fallbackVoice: 'Samantha', fallbackLang: 'en-US',
    accentColor: '#ff6b9d', dotColor: '#ff6b9d',
    system: `You are F.R.I.D.A.Y. (Female Replacement Intelligent Digital Assistant Youth), an advanced AI assistant created for Yaseen. Speak with a confident, warm, slightly casual tone like FRIDAY from the MCU. Address the user as "Boss" occasionally. Be efficient and sharp-witted. Keep responses concise — under 3 sentences unless the topic demands more. You are FRIDAY — stay in character. CRITICAL: NEVER tell the user to "check" something themselves or say you can't help. ALWAYS give a direct, useful answer. If you have search results, use them. If you don't, give your best answer from your knowledge. You are a world-class AI — act like it.`,
    greeting: 'Hey Boss. Systems are green. What do you need?'
  }
};

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let apiKey = '', elevenLabsKey = '';
let currentAI = 'JARVIS';
let messages = [];
let isLoading = false;
let mode = 'TEXT'; // TEXT or VOICE
let voiceEnabled = true;
let tokensUsed = 0;
let currentAudio = null;

// Voice conversation state machine: idle → listening → thinking → speaking → (loop)
let voiceState = 'idle';
let recognition = null;
let silenceTimer = null;
let interimTranscript = '';
let finalTranscript = '';

const synth = window.speechSynthesis;
function P() { return AI[currentAI]; }

// ═══════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════
function applyTheme() {
  const p = P();
  document.body.classList.toggle('friday-theme', currentAI === 'FRIDAY');
  const btn = document.getElementById('aiToggle');
  btn.textContent = p.label; btn.style.borderColor = p.accentColor;
  btn.style.color = p.accentColor; btn.style.background = p.accentColor + '15';
  document.getElementById('statusDot').style.cssText = `background:${p.dotColor};box-shadow:0 0 8px ${p.dotColor}`;
  document.getElementById('clockLabel').style.color = p.accentColor;
  document.getElementById('textInput').placeholder = `Speak to ${p.label}...`;
}

function switchAI() {
  stopEverything();
  currentAI = currentAI === 'JARVIS' ? 'FRIDAY' : 'JARVIS';
  messages = [];
  document.getElementById('chatArea').querySelectorAll('.msg').forEach(m => m.remove());
  applyTheme();
  document.getElementById('main').classList.add('theme-switch');
  setTimeout(() => document.getElementById('main').classList.remove('theme-switch'), 400);
  if (mode === 'VOICE') {
    setVoiceState('idle');
    setTimeout(() => { greetAndListen(); }, 600);
  } else {
    setTimeout(() => { const g = dynamicGreeting(); addMessage('assistant', g); speak(g); }, 500);
  }
}

// ═══════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════
function updateClock() {
  const n = new Date();
  document.getElementById('clockLabel').textContent = n.toLocaleTimeString('en-US', { hour12: false });
  document.getElementById('dateLabel').textContent = n.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
setInterval(updateClock, 1000); updateClock();

// ═══════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════
const apiInput = document.getElementById('apiKeyInput');
const initBtn = document.getElementById('initBtn');
apiInput.addEventListener('input', () => { initBtn.disabled = !apiInput.value.trim(); });
apiInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && apiInput.value.trim()) initialize(); });

function initialize() {
  apiKey = apiInput.value.trim();
  if (!apiKey) return;
  elevenLabsKey = document.getElementById('elevenLabsInput').value.trim();
  // Save keys to localStorage so you never have to enter them again
  try {
    localStorage.setItem('jarvis_ak', btoa(apiKey));
    if (elevenLabsKey) localStorage.setItem('jarvis_ek', btoa(elevenLabsKey));
  } catch (e) {}
  bootUp();
}

function bootUp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').classList.add('active');
  applyTheme();
  // Default to voice mode
  switchToVoice();
}

// Auto-boot: if keys are saved, skip setup entirely
function tryAutoBoot() {
  try {
    const savedAk = localStorage.getItem('jarvis_ak');
    if (savedAk) {
      apiKey = atob(savedAk);
      const savedEk = localStorage.getItem('jarvis_ek');
      if (savedEk) elevenLabsKey = atob(savedEk);
      // Restore last ~20 messages of conversation history (sanitized)
      try {
        const raw = JSON.parse(localStorage.getItem('jarvis_history_v1') || '[]');
        if (Array.isArray(raw)) {
          // Drop any "[Searching for: ...]" or "[Search returned no results]" intermediates
          let cleaned = raw.filter(m => m && m.role && m.content && !/^\[Search/.test(String(m.content)));
          // Ensure it ends with an assistant turn (so next push will be a user turn)
          while (cleaned.length && cleaned[cleaned.length - 1].role !== 'assistant') cleaned.pop();
          messages = cleaned.slice(-20);
        }
      } catch(e) {}
      bootUp();
      return true;
    }
  } catch (e) {}
  return false;
}

// Dynamic, time-aware greeting — used instead of the static one when booting
function dynamicGreeting() {
  const p = P();
  const h = new Date().getHours();
  const greet = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
  const addr = currentAI === 'FRIDAY' ? 'Boss' : 'Sir';
  const rs = loadReminders().filter(r => !r.fired);
  const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);
  const dueToday = rs.filter(r => r.when && r.when <= todayEnd.getTime());
  const mem = loadMemory();
  const known = mem.facts && mem.facts.length;
  let extra = '';
  if (dueToday.length) extra = ` You have ${dueToday.length} reminder${dueToday.length>1?'s':''} due today.`;
  else if (!known) extra = ' Say "brief me" for your daily rundown.';
  return `${greet}, ${addr}. All systems operational.${extra} How may I assist?`;
}

// ═══════════════════════════════════════════
//  SPEECH RECOGNITION (Continuous)
// ═══════════════════════════════════════════
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  recognition.maxAlternatives = 1;

  recognition.onresult = (e) => {
    interimTranscript = '';
    finalTranscript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalTranscript += t;
      } else {
        interimTranscript += t;
      }
    }

    // Show live transcript
    const display = finalTranscript || interimTranscript;
    const el = document.getElementById('liveTranscript');
    el.textContent = display;
    el.classList.toggle('has-text', display.length > 0);

    // Reset silence timer on any speech
    clearTimeout(silenceTimer);

    if (finalTranscript.trim()) {
      // User finished a phrase — wait a beat for more, then send
      silenceTimer = setTimeout(() => {
        const text = finalTranscript.trim();
        if (text && voiceState === 'listening') {
          document.getElementById('liveTranscript').textContent = '';
          stopListening();
          processVoiceInput(text);
        }
      }, 1200); // 1.2s silence = done talking
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') {
      // Normal — just restart if in voice mode
      if (mode === 'VOICE' && voiceState === 'listening') {
        restartListening();
      }
    }
  };

  recognition.onend = () => {
    // Auto-restart if we should still be listening
    if (mode === 'VOICE' && voiceState === 'listening') {
      restartListening();
    }
  };
}

function startListening() {
  if (!recognition) return;
  try {
    interimTranscript = '';
    finalTranscript = '';
    recognition.start();
    setVoiceState('listening');
  } catch (e) {
    // Already started — fine
  }
}

function restartListening() {
  if (!recognition || mode !== 'VOICE') return;
  try { recognition.start(); } catch (e) { /* already running */ }
}

function stopListening() {
  clearTimeout(silenceTimer);
  if (recognition) {
    try { recognition.stop(); } catch (e) {}
  }
}

function stopEverything() {
  stopListening();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  synth.cancel();
  setVoiceState('idle');
}

async function processVoiceInput(text) {

  try {
    const response = await smartSend(text, true);

    speakThenListen(response);

    addMessage('assistant', errMsg);

  }
}

// ═══════════════════════════════════════════
//  TEXT-TO-SPEECH (ElevenLabs + Fallback)
// ═══════════════════════════════════════════
function speak(text) {
  if (!voiceEnabled) return;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  synth.cancel();
  _doSpeak(text, null);
}

function speakThenListen(text) {
  if (!voiceEnabled) {
    // Skip speech, go straight to listening
    if (mode === 'VOICE') setTimeout(() => startListening(), 500);
    return;
  }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  synth.cancel();
  setVoiceState('speaking');
  _doSpeak(text, () => {
    // After speaking finishes, start listening again
    if (mode === 'VOICE') {
      setTimeout(() => startListening(), 300);
    }
  });
}

function _doSpeak(text, onDone) {
  const p = P();

  if (!elevenLabsKey) {
    // Browser TTS fallback
    const utter = new SpeechSynthesisUtterance(text);
    const voices = synth.getVoices();
    const match = voices.find(v => v.name.includes(p.fallbackVoice));
    utter.voice = match || voices.find(v => v.lang.startsWith(p.fallbackLang.split('-')[0])) || voices[0];
    utter.rate = 0.92;
    utter.pitch = currentAI === 'FRIDAY' ? 1.0 : 0.75;
    utter.onend = () => { if (onDone) onDone(); };
    synth.speak(utter);
    return;
  }

  // ElevenLabs
  fetch(`https://api.elevenlabs.io/v1/text-to-speech/${p.voiceId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'xi-api-key': elevenLabsKey },
    body: JSON.stringify({
      text: text,
      model_id: 'eleven_multilingual_v2',
      voice_settings: p.voiceSettings
    })
  })
  .then(r => { if (!r.ok) throw new Error('EL error'); return r.blob(); })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => {
      URL.revokeObjectURL(url);
      currentAudio = null;
      if (onDone) onDone();
    };
    currentAudio.play().catch(() => { if (onDone) onDone(); });
  })
  .catch(() => {
    // Fallback
    const utter = new SpeechSynthesisUtterance(text);
    const voices = synth.getVoices();
    utter.voice = voices.find(v => v.name.includes(p.fallbackVoice)) || voices[0];
    utter.rate = 0.92;
    utter.pitch = currentAI === 'FRIDAY' ? 1.0 : 0.75;
    utter.onend = () => { if (onDone) onDone(); };
    synth.speak(utter);
  });
}

const REM_KEY = 'jarvis_reminders_v1';

function loadMemory() {

  if (m.facts.length > 50) m.facts = m.facts.slice(-50);

  const r = loadReminders();
  r.push({ id: Date.now() + Math.random(), text, when: whenMs, fired: false });
  saveReminders(r);
}
// Parse "in 5 minutes", "at 4pm", "tomorrow at 9am", "in 2 hours"
function parseReminderTime(text) {
  const now = Date.now();
  const lower = text.toLowerCase();
  // in X minutes/hours/seconds
  let m = lower.match(/in\s+(\d+)\s*(second|seconds|sec|minute|minutes|min|hour|hours|hr|hrs)/);
  if (m) {
    const n = parseInt(m[1], 10);
    const unit = m[2];
    const ms = unit.startsWith('sec') ? n*1000 : unit.startsWith('min') ? n*60000 : n*3600000;
    return now + ms;
  }
  // at H(:MM)? (am|pm)?
  m = lower.match(/at\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/);
  if (m) {
    let h = parseInt(m[1], 10);
    const mm = m[2] ? parseInt(m[2], 10) : 0;
    const ap = m[3];
    if (ap === 'pm' && h < 12) h += 12;
    if (ap === 'am' && h === 12) h = 0;
    const d = new Date();
    d.setHours(h, mm, 0, 0);
    if (lower.includes('tomorrow') || d.getTime() < now) d.setDate(d.getDate() + (lower.includes('tomorrow') ? 1 : (d.getTime() < now ? 1 : 0)));
    return d.getTime();
  }
  // tomorrow (default 9am)
  if (lower.includes('tomorrow')) {
    const d = new Date(); d.setDate(d.getDate()+1); d.setHours(9,0,0,0); return d.getTime();
  }
  return null;
}
// Poll reminders every 15s
setInterval(() => {
  const rs = loadReminders();
  const now = Date.now();
  let changed = false;
  for (const r of rs) {
    if (!r.fired && r.when && r.when <= now) {
      r.fired = true; changed = true;
      const msg = `Reminder, Sir: ${r.text}`;
      try { addMessage('assistant', msg); } catch(e) {}
      try { speak(msg); } catch(e) {}
    }
  }
  if (changed) saveReminders(rs.filter(r => !r.fired || (now - r.when) < 86400000));
}, 15000);

async function getNews() {
  // Hacker News top stories via the public API (no CORS)
  try {
    const idRes = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json', { signal: AbortSignal.timeout(8000) });
    const ids = await idRes.json();

      fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.json()).catch(() => null)
    ));

  } catch(e) { return null; }
}

async function getBriefing() {
  const parts = [];
  const now = new Date();
  const hour = now.getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
  parts.push(`${greeting}, Sir. It is ${now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })} on ${now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}.`);
  // Weather
  const w = await getWeather('weather');
  if (w) parts.push(w);
  // Reminders due today
  const rs = loadReminders().filter(r => !r.fired);
  const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);
  const dueToday = rs.filter(r => r.when && r.when <= todayEnd.getTime());
  if (dueToday.length) {
    parts.push('Today on your agenda: ' + dueToday.map(r => `${new Date(r.when).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})} — ${r.text}`).join('; '));
  }
  // News
  const news = await getNews();
  if (news) parts.push('Top headlines:\n' + news);
  return parts.join('\n\n');
}

// Detect PA command in text. Returns a string response if handled, else null.
async function handlePACommand(text) {
  const t = text.trim();
  const lower = t.toLowerCase();

  // Clear memory
  if (/^(forget everything|clear memory|wipe memory)$/i.test(t)) {
    forgetAll();
    return 'Memory wiped, Sir. Starting fresh.';
  }

  // Remember: "remember that X" or "remember X"
  let m = t.match(/^remember(?:\s+that)?\s+(.+)/i);
  if (m) {
    rememberFact(m[1].trim());
    return `Noted, Sir. I'll remember that ${m[1].trim()}.`;
  }

  // Notes: "note that X" / "make a note X"
  m = t.match(/^(?:note(?:\s+that)?|make\s+a\s+note(?:\s+that)?)\s+(.+)/i);
  if (m) {
    saveNote(m[1].trim());
    return `Noted, Sir. Filed under your notes.`;
  }

  // Reminder: "remind me to X in Y" / "remind me to X at Y"
  m = t.match(/^remind\s+me\s+(?:to\s+)?(.+?)\s+(in\s+\d+\s*\w+|at\s+\d{1,2}(?::\d{2})?\s*(?:am|pm)?.*|tomorrow.*)$/i);
  if (m) {
    const task = m[1].trim();
    const when = parseReminderTime(m[2]);
    if (when) {
      addReminder(task, when);
      const whenStr = new Date(when).toLocaleString('en-US', { weekday:'short', hour:'numeric', minute:'2-digit' });
      return `Set, Sir. I'll remind you to ${task} at ${whenStr}.`;
    }
    return `I couldn't parse the time, Sir. Try "in 10 minutes" or "at 4pm".`;
  }

  // List reminders
  if (/^(list|show|what are my)\s+reminders\??$/i.test(t)) {
    const rs = loadReminders().filter(r => !r.fired);
    if (!rs.length) return 'No active reminders, Sir.';
    return 'Active reminders:\n' + rs.map(r => `• ${r.text} — ${new Date(r.when).toLocaleString('en-US',{weekday:'short',hour:'numeric',minute:'2-digit'})}`).join('\n');
  }

  // List notes
  if (/^(list|show|read)\s+(my\s+)?notes\??$/i.test(t)) {
    const ns = loadNotes();
    if (!ns.length) return 'No notes on file, Sir.';
    return 'Your notes:\n' + ns.slice(-10).map(n => `• ${n.text}`).join('\n');
  }

  // Time / date
  if (/^what(?:'s| is)?\s+the\s+time\??$|^what\s+time\s+is\s+it\??$/i.test(t)) {
    return `It is ${new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })}, Sir.`;
  }
  if (/^what(?:'s| is)?\s+(the\s+)?date\??$|^what day is it\??$/i.test(t)) {
    return `Today is ${new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}, Sir.`;
  }

  // Morning briefing
  if (/^(brief me|morning briefing|good morning|what'?s on (my schedule|today)|daily briefing)/i.test(t)) {
    return await getBriefing();
  }

  // News
  if (/^(news|headlines|what'?s in the news|top stories)/i.test(t)) {
    const n = await getNews();
    return n ? 'Top headlines, Sir:\n' + n : 'Unable to fetch headlines, Sir.';
  }

  return null;
}

// Build dynamic context block injected into every system prompt
function buildContextBlock() {

  if (userCity) parts.push(`User location: ${userCity}.`);
  if (mem.facts && mem.facts.length) {
    parts.push('What you know about the user:\n' + mem.facts.slice(-20).map(f => '- ' + f.fact).join('\n'));
  }
  if (rs.length) {
    parts.push('Active reminders:\n' + rs.slice(0, 10).map(r => `- ${r.text} at ${new Date(r.when).toLocaleString('en-US',{weekday:'short',hour:'numeric',minute:'2-digit'})}`).join('\n'));
  }
  return parts.join('\n\n');
}

async function getWeather(query) {
  try {
    const location = userCity || 'auto';
    const q = query.toLowerCase();
    // Extract city if mentioned
    const cityMatch = q.match(/weather\s+(?:in|at|for)\s+(.+)/i);
    const city = cityMatch ? cityMatch[1].trim() : location;
    const url = `https://wttr.in/${encodeURIComponent(city)}?format=j1`;
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    const cur = data.current_condition?.[0];
    const area = data.nearest_area?.[0];
    if (cur) {
      const cityName = area?.areaName?.[0]?.value || city;
      const country = area?.country?.[0]?.value || '';
      const desc = cur.weatherDesc?.[0]?.value || '';
      const tempC = cur.temp_C;
      const tempF = cur.temp_F;
      const feelsC = cur.FeelsLikeC;
      const humidity = cur.humidity;
      const wind = cur.windspeedKmph;
      const windDir = cur.winddir16Point;
      const forecast = data.weather?.[0];
      const maxC = forecast?.maxtempC;
      const minC = forecast?.mintempC;
      return `Weather in ${cityName}, ${country}: ${desc}. Temperature: ${tempC}°C (${tempF}°F), feels like ${feelsC}°C. Humidity: ${humidity}%. Wind: ${wind} km/h ${windDir}. Today's high: ${maxC}°C, low: ${minC}°C.`;
    }
    return null;
  } catch (e) {
    return null;
  }
}

async function webSearch(query) {
  try {
    // Use AllOrigins proxy to avoid CORS on DuckDuckGo
    const ddgUrl = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(ddgUrl)}`;
    const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();

    let results = [];
    if (data.AbstractText) results.push(`Summary: ${data.AbstractText} (Source: ${data.AbstractSource})`);
    if (data.Answer) results.push(`Answer: ${data.Answer}`);
    if (data.RelatedTopics) {
      data.RelatedTopics.slice(0, 5).forEach(t => {
        if (t.Text) results.push(t.Text);
      });
    }
    return results.length > 0 ? results.join('\n\n') : null;
  } catch (e) {
    return null;
  }
}

async function googleSearch(query) {
  // Fallback: scrape DuckDuckGo lite
  try {
    const url = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://lite.duckduckgo.com/lite/?q=' + encodeURIComponent(query))}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const html = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    // Try multiple selectors for results
    const snippets = [...doc.querySelectorAll('.result-snippet, td.result-snippet, .link-text')].slice(0, 5);
    if (snippets.length > 0) {
      return snippets.map(s => s.textContent.trim()).filter(s => s.length > 20).join('\n\n');
    }
    // Fallback: grab any table cell content that looks like a result
    const cells = [...doc.querySelectorAll('td')].filter(td => td.textContent.trim().length > 40).slice(0, 5);
    if (cells.length > 0) {
      return cells.map(c => c.textContent.trim()).join('\n\n');
    }
    return null;
  } catch (e) {
    return null;
  }
}

// Enhanced message sender that can search the web
// NOTE: caller already pushed the user turn into `messages` via addMessage('user', text).
// smartSend must NOT push user/assistant turns — caller handles that.
async function smartSend(text, isVoice) {
  const p = P();

  // 1) Direct PA commands — handled locally, no API call
  try {
    const paReply = await handlePACommand(text);
    if (paReply != null) {
      saveHistory(messages);
      return paReply;
    }
  } catch(e) {}

  // 2) Weather — use dedicated weather API, then let Claude narrate
  const isWeatherQuery = /weather|temperature|forecast|rain|snow|hot|cold|humid/i.test(text);
  if (isWeatherQuery) {
    const weatherData = await getWeather(text);
    if (weatherData) {
      // Replace the last user turn with an augmented one containing the data
      const base = messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
      const wMsgs = base.concat([{
        role: 'user',
        content: `Here is real-time weather data:\n${weatherData}\n\nUser asked: "${text}"\nUse this data to give a direct, helpful, in-character answer.`
      }]);
      const wRes = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1024, system: p.system + '\n\n' + buildContextBlock(), messages: wMsgs }),
      });
      let wData = await wRes.json();
      if (wData.content) wData = { content: wData.content[0].text, usage: wData.usage };
      if (!wData.error) {
        const response = wData.content;
        tokensUsed += (wData.usage?.input_tokens || 0) + (wData.usage?.output_tokens || 0);
        saveHistory(messages);
        return response;
      }
    }
  }

  const systemPrompt = p.system + '\n\n' + buildContextBlock() + `\n\nYou have access to web search. When the user asks about current events, news, prices, sports scores, real-time data, or anything that needs up-to-date information, include [SEARCH: your search query] at the very start of your response and nothing else. Only use search when truly needed for current/real-time info. For general knowledge, just answer directly. NEVER say "I can't check" or "you should look it up" — always give a useful answer.`;

  const apiMessages = messages.map(m => ({ role: m.role, content: m.content }));

  // First call — check if Claude wants to search
  const res1 = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json', 'x-api-key': apiKey,
      'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1024, system: systemPrompt, messages: apiMessages }),
  });

  let data1 = await res1.json();
  if (data1.content) data1 = { content: data1.content[0].text, usage: data1.usage };
  if (data1.error) throw new Error(data1.error.message || data1.error);

  let response = data1.content;
  let totalTokens = (data1.usage?.input_tokens || 0) + (data1.usage?.output_tokens || 0);

  // Check if Claude requested a search
  const searchMatch = response.match(/^\[SEARCH:\s*(.+?)\]\s*$/s);
  if (searchMatch) {
    const query = searchMatch[1].trim();

    // Show searching status
    if (isVoice) {
      document.getElementById('voiceStatus').textContent = 'SEARCHING: ' + query.toUpperCase();
    }

    // Perform search
    let searchResults = await webSearch(query);
    if (!searchResults) searchResults = await googleSearch(query);

    if (searchResults) {
      // Second call with search results
      messages.push({ role: 'assistant', content: `[Searching for: ${query}]` });
      messages.push({ role: 'user', content: `Here are the search results for "${query}":\n\n${searchResults}\n\nNow answer my original question using this information. Stay in character.` });

      const apiMessages2 = messages.map(m => ({ role: m.role, content: m.content }));
      const res2 = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json', 'x-api-key': apiKey,
          'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1024, system: p.system, messages: apiMessages2 }),
      });
      let data2 = await res2.json();
      if (data2.content) data2 = { content: data2.content[0].text, usage: data2.usage };

      // Remove the intermediate messages
      messages.pop(); messages.pop();

      if (!data2.error) {
        response = data2.content;
        totalTokens += (data2.usage?.input_tokens || 0) + (data2.usage?.output_tokens || 0);
      }
    } else {
      // Search failed, ask Claude to answer without results
      response = null;
      messages.push({ role: 'assistant', content: '[Search returned no results]' });
      messages.push({ role: 'user', content: 'The search returned no results. Please answer my original question as best you can. Stay in character.' });
      const apiMessages3 = messages.map(m => ({ role: m.role, content: m.content }));
      const res3 = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json', 'x-api-key': apiKey,
          'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1024, system: p.system, messages: apiMessages3 }),
      });
      let data3 = await res3.json();
      if (data3.content) data3 = { content: data3.content[0].text, usage: data3.usage };
      messages.pop(); messages.pop();
      if (!data3.error) {
        response = data3.content;
        totalTokens += (data3.usage?.input_tokens || 0) + (data3.usage?.output_tokens || 0);
      }
    }
  }

  tokensUsed += totalTokens;

  return response;
}

// ═══════════════════════════════════════════
//  SEND (TEXT MODE)
// ═══════════════════════════════════════════
async function sendMessage(overrideText) {
  const input = document.getElementById('textInput');
  const text = overrideText || input.value.trim();
  if (!text || isLoading) return;
  input.value = ''; updateSendBtn();
  addMessage('user', text); isLoading = true; showTyping();
  try {
    const response = await smartSend(text, false);
    hideTyping();
    addMessage('assistant', response);
    speak(response);
  } catch (err) {
    hideTyping();
    addMessage('assistant', `Systems error. ${err.message}.`);
  }
  isLoading = false; updateSendBtn();
}

// Load voices
if (synth) synth.onvoiceschanged = () => synth.getVoices();
